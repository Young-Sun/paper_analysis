name: Auto Analyze and Publish

on:
  push:
    branches:
      - main
    paths:
      - 'paper_links.txt' # 이 파일이 수정될 때만 작동
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Paper Analysis Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python analyze.py

      - name: Commit newly generated Markdown and Images
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # 변경사항이 있을 경우에만 커밋
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generated paper analysis" && git push)

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
