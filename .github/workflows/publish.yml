name: Auto Analyze and Publish

on:
  push:
    branches:
      - main
    paths:
      - 'paper_links.txt' # 오직 이 파일이 수정되어 push될 때만 자동 실행
  
  # 수동 실행을 가능하게 하는 설정 (Actions 탭에서 Run workflow 버튼 생성)
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pymupdf google-genai requests mkdocs-material

      - name: Run Paper Analysis Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python analyze.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # 변경사항이 있을 때만 커밋하고 [skip ci]로 무한 루프 방지
          if [ -n "$(git status --porcelain docs/)" ]; then
            git commit -m "docs: auto-generate analysis and images [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
